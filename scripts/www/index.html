<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>iOS 26 梦幻极光 (全域玻璃系统·质感顶峰版)</title>
    <style>
        :root {
            /* 物理内核坐标参数 */
            --item-w: 110px;
            --item-h: 50px;
            --dock-w: 330px;
            --radius-pill: 99px;
            --x: 0px; 
            
            /* 流体缓动曲线引擎 */
            --ease-slide: cubic-bezier(0.3, 1.1, 0.4, 1); 
            --ease-jelly: cubic-bezier(0.4, 2.0, 0.4, 0.8); 
            --ease-spring: cubic-bezier(0.35, 1.6, 0.3, 1); 
            --ease-bouncy: cubic-bezier(0.35, 1.9, 0.3, 1); 

            /* 浅色基准域 */
            --bg-page: #f2f4f8; 
            --text-base: #1c1c1e;
            --text-active: #007aff;
            --font-main: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-main); }
        body { background-color: var(--bg-page); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 50px; touch-action: none; user-select: none; overflow-x: hidden; }

        /* ✨ 柔彩环境呼吸高斯域 */
        .aurora-bg { position: fixed; inset: 0; z-index: -1; background: var(--bg-page); filter: blur(70px); }
        .blob { position: absolute; border-radius: 50%; opacity: 0.35; animation: float 18s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        .blob-1 { width: 45vw; height: 45vw; background: #007aff; top: -10%; left: -10%; animation-delay: 0s; }
        .blob-2 { width: 35vw; height: 35vw; background: #ff2d55; bottom: -5%; right: 5%; animation-delay: -5s; }
        .blob-3 { width: 40vw; height: 40vw; background: #af52de; top: 30%; left: 50%; animation-delay: -10s; }
        @keyframes float { 0% { transform: translate(0, 0) scale(1) rotate(0deg); } 50% { transform: translate(12vw, 8vh) scale(1.1) rotate(10deg); } 100% { transform: translate(-8vw, -10vh) scale(0.9) rotate(-10deg); } }

        /* ========================================================
           🔥 全局悬浮：顶层导航舱 (新增按住放大的联体张力)
           ======================================================== */
        .dock-capsule {
            background: rgba(255, 255, 255, 0.45); border-radius: var(--radius-pill); padding: 8px;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.7), 0 4px 20px rgba(0,0,0,0.04);
            backdrop-filter: blur(30px) saturate(180%); -webkit-backdrop-filter: blur(30px) saturate(180%);
            z-index: 100; transform: translateY(0) scale(1);
            transition: transform 0.5s var(--ease-spring), box-shadow 0.5s var(--ease-spring);
        }
        
        /* 🔥 被按住拖拽时，整条基座膨胀立起，增加巨额阴影！ */
        .dock-capsule.is-active {
            transform: translateY(-4px) scale(1.06);
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.9), 0 18px 45px rgba(0,0,0,0.12);
        }

        .dock-track { position: relative; width: var(--dock-w); height: var(--item-h); cursor: pointer; }
        .layer { position: absolute; inset: 0; display: flex; pointer-events: none; }
        
        .dock-item { width: var(--item-w); height: 100%; display: flex; align-items: center; justify-content: center; font-size: 14.5px; font-weight: 500; flex-shrink: 0; gap: 6px; color: var(--text-base); transform-origin: center center; transition: opacity 0.5s var(--ease-spring), transform 0.5s var(--ease-spring), filter 0.4s; }
        .layer.base svg { fill: var(--text-base); width: 22px; height: 22px; transition: filter 0.4s;}
        .dock-item.no-anim { transition: none !important; }

        /* 💧 光学透镜层 */
        .lens-wrapper { position: absolute; top: 0; left: 0; z-index: 10; width: var(--item-w); height: var(--item-h); transform: translateX(var(--x)); }
        .lens-glass { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 110px; height: 50px; border-radius: var(--radius-pill); overflow: hidden; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(8px) saturate(120%); -webkit-backdrop-filter: blur(8px) saturate(120%); box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.5), 0 3px 12px rgba(0,0,0,0.05); transition: width 0.4s var(--ease-jelly), height 0.4s var(--ease-jelly), background 0.3s, backdrop-filter 0.3s, box-shadow 0.3s; }
        .is-dragging .lens-glass { width: 140px; height: 80px; background: transparent; backdrop-filter: blur(20px) saturate(150%) brightness(1.05); box-shadow: inset 0 8px 18px rgba(255, 255, 255, 0.7), inset 0 -2px 10px rgba(255, 255, 255, 0.2), inset 0 0 0 1px rgba(255, 255, 255, 0.5), 0 15px 35px rgba(0, 0, 0, 0.1); }
        .is-popping .lens-glass { width: 120px; height: 60px; background: rgba(255, 255, 255, 0.05); box-shadow: inset 0 4px 10px rgba(255, 255, 255, 0.9), inset 0 0 0 1px rgba(255, 255, 255, 0.6), 0 8px 20px rgba(0, 0, 0, 0.08); }
        .lens-content { position: absolute; top: 50%; left: 50%; width: var(--dock-w); height: var(--item-h); display: flex; transform: translate(calc(-55px - var(--x)), -50%); }
        .lens-content .dock-item { color: var(--text-active); text-shadow: 0 1px 3px rgba(0,122,255,0.15);  }
        .lens-content svg { fill: var(--text-active); width: 22px; height: 22px; filter: drop-shadow(0 1px 3px rgba(0,122,255,0.15));}
        .is-dragging .lens-content .dock-item { text-shadow: 0 0 12px rgba(0, 122, 255, 0.4); }

        .is-shooting .lens-glass { animation: glass-squish 0.6s cubic-bezier(0.35, 0, 0.25, 1) forwards; }
        .is-shooting .lens-content .dock-item { animation: text-squish 0.6s cubic-bezier(0.35, 0, 0.25, 1) forwards; }
        @keyframes glass-squish { 0% { width: 110px; height: 50px; border-radius: 99px; } 35% { width: 125px; height: 49px; border-radius: 99px; } 65% { width: 95px; height: 52px; border-radius: 40px; } 85% { width: 115px; height: 49px; border-radius: 99px; } 100% { width: 110px; height: 50px; border-radius: 99px; } }
        @keyframes text-squish { 0% { transform: scale(1) !important; } 35% { transform: scale(1.1) !important; text-shadow: 0 0 8px rgba(0, 122, 255, 0.3); } 65% { transform: scale(0.96) !important; text-shadow: 0 0 2px rgba(0, 122, 255, 0.1); } 85% { transform: scale(1.02) !important; } 100% { transform: scale(1) !important; } }

        /* 应用面板与容器 */
        .panels-wrapper { flex-grow: 1; display: flex; justify-content: center; align-items: flex-start; width: 100%; margin-top: 35px; padding: 0 16px; margin-bottom: 50px; position: relative; z-index: 10; }
        .panels { display: grid; width: 100%; max-width: 360px; }
        .panel { grid-area: 1 / 1; background: rgba(255, 255, 255, 0.55); border: 1px solid rgba(255, 255, 255, 0.9); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px); border-radius: 36px; padding: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.06); visibility: hidden; opacity: 0; transform: scale(0.92) translateY(20px); pointer-events: none; transition: all 0.5s var(--ease-slide); }
        .panel.active { visibility: visible; opacity: 1; transform: scale(1) translateY(0); pointer-events: auto; }
        
        .c-screen { position: relative; height: 105px; background: rgba(255,255,255,0.85); border-radius: 20px; margin-bottom: 16px; overflow: hidden; border: 1px solid rgba(255,255,255,1); box-shadow: inset 0 2px 8px rgba(0,0,0,0.03);}
        .c-exp, .c-pre { position: absolute; right: 20px; text-align: right; transform-origin: right center; white-space: nowrap; transition: all 0.5s var(--ease-slide); }
        .c-exp { top: 25px; font-size: 2rem; color: #1c1c1e; font-weight: bold; }
        .c-pre { bottom: 15px; font-size: 1.1rem; color: #8e8e93; font-weight: 500;}
        .c-screen.is-eval .c-exp { transform: translateY(-30px) scale(0.4); opacity: 0; }
        .c-screen.is-eval .c-pre { transform: translateY(-33px) scale(2); color: var(--text-active); font-weight: bold; text-shadow: 0 4px 10px rgba(0,122,255,0.2);}
        
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .grid-5 { grid-template-columns: repeat(5, 1fr); gap: 6px; }
        
        /* 按钮与光效体 */
        button { position: relative; overflow: hidden; border: 1px solid rgba(255,255,255,0.7); background: rgba(255, 255, 255, 0.45); backdrop-filter: blur(10px); border-radius: 18px; font-size: 1.3rem; font-weight: 500; color: #1c1c1e; padding: 16px 0; cursor: pointer; transition: transform 0.6s var(--ease-bouncy), background 0.3s, box-shadow 0.3s, border-color 0.3s; box-shadow: 0 4px 10px rgba(0,0,0,0.015); --bx: 50%; --by: 50%; }
        button:active { transform: scale(1.08); background: rgba(255, 255, 255, 0.95); border-color: rgba(255,255,255,1); box-shadow: 0 10px 25px rgba(0,0,0,0.08), inset 0 0 0 1px rgba(255,255,255,1); }
        
        button::after, button::before { content: ''; position: absolute; inset: 0; pointer-events: none; opacity: 0; transition: opacity 0.2s; z-index: 1; }
        button::after { background: radial-gradient(circle 90px at var(--bx) var(--by), rgba(255, 255, 255, 1) 0%, rgba(255, 255, 255, 0) 100%); mix-blend-mode: overlay; }
        button::before { background: radial-gradient(circle 50px at var(--bx) var(--by), rgba(255, 255, 255, 0.5) 0%, rgba(255, 255, 255, 0) 100%); }
        button:hover::after, button:hover::before { opacity: 1; }

        .btn-fc { background: rgba(0, 122, 255, 0.08); color: var(--text-active); font-size: 1.1rem;}
        .btn-op { background: rgba(255, 45, 85, 0.08); color: #ff2d55; font-weight: bold; font-size: 1.5rem;}
        .btn-eq { background: var(--text-active); color: #fff; box-shadow: 0 6px 15px rgba(0, 122, 255, 0.3); border: none;}
        
        /* 🔥 定制要求：“确定核算”等纯色按钮的光效改：范围大，极度柔和，拒绝生硬 */
        .btn-eq::after { background: radial-gradient(circle 160px at var(--bx) var(--by), rgba(255, 255, 255, 0.3) 0%, rgba(255, 255, 255, 0) 100%); }
        .btn-eq::before { background: radial-gradient(circle 80px at var(--bx) var(--by), rgba(255, 255, 255, 0.15) 0%, rgba(255, 255, 255, 0) 100%); }

        .grid-5 button { padding: 13px 0; font-size: 1.1rem; border-radius: 14px; }

        /* ========================================================
           🔥 重构的【全自动液态定制下拉框】系统！
           ======================================================== */
        .u-row { display: flex; gap: 8px; margin-bottom: 12px; align-items: center; width: 100%; position: relative; }
        
        input { 
            flex: 1; min-width: 0; padding: 16px 14px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.6); 
            font-size: 1rem; color: #1c1c1e; font-weight: 500; outline: none; appearance: none; -webkit-appearance: none; 
            background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.4), 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: transform 0.6s var(--ease-bouncy), box-shadow 0.4s var(--ease-spring), background 0.4s, border-color 0.4s;
        }
        input:focus { 
            transform: scale(1.05); background: rgba(255,255,255,0.7); border-color: rgba(255,255,255,1);
            box-shadow: inset 0 3px 8px rgba(255, 255, 255, 1), 0 12px 30px rgba(0,122,255,0.15), 0 0 0 2px rgba(0,122,255,0.2);
        }

        .g-sel { position: relative; flex: 1; min-width: 0; user-select: none; }
        .g-val {
            padding: 16px 14px; border-radius: 22px; border: 1px solid rgba(255,255,255,0.6); 
            font-size: 1rem; color: #1c1c1e; font-weight: 500; cursor: pointer;
            background: rgba(255, 255, 255, 0.35); backdrop-filter: blur(25px) saturate(180%); -webkit-backdrop-filter: blur(25px) saturate(180%);
            box-shadow: inset 0 2px 5px rgba(255, 255, 255, 0.8), inset 0 0 0 1px rgba(255, 255, 255, 0.4), 0 4px 15px rgba(0, 0, 0, 0.03);
            transition: transform 0.6s var(--ease-bouncy), box-shadow 0.4s var(--ease-spring), background 0.4s, border-color 0.4s;
            display: flex; justify-content: space-between; align-items: center; white-space: nowrap; overflow: hidden;
        }
        .g-val span { text-overflow: ellipsis; overflow: hidden; font-weight: 600; }
        .g-val::after {
            content: ''; width: 8px; height: 8px; border-right: 2.5px solid var(--text-active); border-bottom: 2.5px solid var(--text-active); 
            transform: rotate(45deg); margin-left: 10px; margin-bottom: 4px; transition: transform 0.4s var(--ease-spring), margin 0.4s var(--ease-spring); flex-shrink: 0;
        }
        
        .g-sel.is-open { z-index: 100; } /* 确保展开层优先级最高 */
        .g-sel.is-open .g-val {
            transform: scale(1.05); background: rgba(255,255,255,0.85); border-color: rgba(255,255,255,1);
            box-shadow: inset 0 3px 8px rgba(255, 255, 255, 1), 0 12px 30px rgba(0,122,255,0.15), 0 0 0 2px rgba(0,122,255,0.2);
        }
        .g-sel.is-open .g-val::after { transform: rotate(-135deg); margin-top: 6px; margin-bottom: 0;}

        /* 🔥 高级漂浮动画圆角下拉面板 */
        .g-menu {
            position: absolute; top: calc(100% + 14px); left: 0; min-width: 100%; 
            background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px);
            border-radius: 24px; padding: 10px; box-shadow: 0 15px 40px rgba(0,0,0,0.12), inset 0 0 0 1.5px rgba(255,255,255,0.9);
            visibility: hidden; opacity: 0; transform: translateY(-15px) scale(0.92); pointer-events: none;
            transition: all 0.4s var(--ease-spring); max-height: 250px; overflow-y: auto; z-index: 101;
        }
        .g-sel.is-open .g-menu {
            visibility: visible; opacity: 1; transform: translateY(0) scale(1); pointer-events: auto;
        }

        .g-opt {
            padding: 14px 16px; border-radius: 16px; font-size: 0.95rem; font-weight: 500; color: #1c1c1e; 
            transition: transform 0.4s var(--ease-bouncy), background 0.2s, color 0.2s; cursor: pointer; white-space: nowrap; margin-bottom: 4px;
        }
        .g-opt:last-child { margin-bottom: 0; }
        .g-opt:hover { background: rgba(0,122,255,0.06); }
        .g-opt:active { transform: scale(0.96); background: rgba(255,255,255,0.9); }
        .g-opt.is-active {
            background: rgba(0,122,255,0.12); color: var(--text-active); font-weight: bold;
            box-shadow: inset 0 0 0 1px rgba(0,122,255,0.1);
        }

        .arrow-div { width: 30px; flex-shrink: 0; text-align: center; color: var(--text-active); font-weight: bold; }
    </style>
</head>
<body>
    <div class="aurora-bg">
        <div class="blob blob-1"></div><div class="blob blob-2"></div><div class="blob blob-3"></div>
    </div>

    <!-- 顶端水流仓 -->
    <nav class="dock-capsule" id="capsule-box">
        <div class="dock-track" id="track">
            <div class="layer base" id="layer-base">
                <div class="dock-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 7h10v2H7zm0 4h10v2H7zm0 4h10v2H7z"/></svg>全能计算</div>
                <div class="dock-item"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>称呼转化</div>
                <div class="dock-item"><svg viewBox="0 0 24 24"><path d="M21 3H3v18h18V3zm-2 16H5V5h14v14zm-6-2h2V7h-2v10zM7 17h2V11H7v6z"/></svg>单位换算</div>
            </div>

            <div class="lens-wrapper" id="lens-wrap">
                <div class="lens-glass">
                    <div class="lens-content" id="lens-cont">
                        <div class="dock-item"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zM7 7h10v2H7zm0 4h10v2H7zm0 4h10v2H7z"/></svg>全能计算</div>
                        <div class="dock-item"><svg viewBox="0 0 24 24"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>称呼转化</div>
                        <div class="dock-item"><svg viewBox="0 0 24 24"><path d="M21 3H3v18h18V3zm-2 16H5V5h14v14zm-6-2h2V7h-2v10zM7 17h2V11H7v6z"/></svg>单位换算</div>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <!-- 应用面板 -->
    <div class="panels-wrapper">
        <div class="panels">
            <!-- P0 -->
            <div class="panel active" id="p-0">
                <div class="c-screen" id="c-screen"><div class="c-exp" id="c-exp">0</div><div class="c-pre" id="c-preview"></div></div>
                <div class="grid">
                    <button class="btn-fc" onclick="bc('sin(')">sin</button><button class="btn-fc" onclick="bc('cos(')">cos</button><button class="btn-fc" onclick="bc('sqrt(')">√</button><button class="btn-fc" onclick="bx()">AC</button>
                    <button onclick="bc('7')">7</button><button onclick="bc('8')">8</button><button onclick="bc('9')">9</button><button class="btn-op" onclick="bc('÷')">÷</button>
                    <button onclick="bc('4')">4</button><button onclick="bc('5')">5</button><button onclick="bc('6')">6</button><button class="btn-op" onclick="bc('×')">×</button>
                    <button onclick="bc('1')">1</button><button onclick="bc('2')">2</button><button onclick="bc('3')">3</button><button class="btn-op" onclick="bc('-')">−</button>
                    <button onclick="bc('0')">0</button><button onclick="bc('.')">.</button><button class="btn-fc" onclick="bd()">DEL</button><button class="btn-op" onclick="bc('+')">+</button>
                    <button class="btn-eq" onclick="be()" style="grid-column: span 4;">= 确定核算</button>
                </div>
            </div>
            <!-- P1 -->
            <div class="panel" id="p-1">
                <div class="c-screen" style="display:flex; flex-direction:column; justify-content:center; padding: 0 20px; align-items:flex-end; border:none; height:110px;">
                    <div style="color:#8e8e93; font-size:1.1rem; margin-bottom:5px;" id="r-ch">起始定点：我</div><div style="color:var(--text-active); font-size:2.3rem; font-weight:bold; letter-spacing: 1px;" id="r-res">自己</div>
                </div>
                <div class="grid grid-5">
                    <button class="btn-fc" onclick="rb('爸爸')">父</button><button class="btn-fc" onclick="rb('妈妈')">母</button><button class="btn-fc" onclick="rb('老公')">夫</button><button class="btn-fc" onclick="rb('老婆')">妻</button><button class="btn-fc" onclick="rb('儿子')">子</button>
                    <button onclick="rb('哥哥')">兄</button><button onclick="rb('弟弟')">弟</button><button onclick="rb('姐姐')">姐</button><button onclick="rb('妹妹')">妹</button><button onclick="rb('女儿')">女</button>
                </div>
                <button class="btn-eq" onclick="rc()" style="width: 100%; margin-top: 15px; border-radius: 16px; padding: 16px 0;">重置网脉</button>
            </div>
            <!-- P2 重构定制化玻璃选择框 -->
            <div class="panel" id="p-2">
                <div class="u-row" style="z-index: 30;">
                    <div class="g-sel" id="gs-ty">
                        <div class="g-val"><span id="v-ty">🏞 表面网络 (面积)</span></div>
                        <div class="g-menu" id="m-ty"></div>
                    </div>
                </div>
                <div class="u-row" style="z-index: 20;">
                    <input type="number" id="u-vl" value="1" oninput="doCal()" placeholder="键入输入值">
                </div>
                <div class="u-row" style="z-index: 10;">
                    <div class="g-sel" id="gs-f">
                        <div class="g-val"><span id="v-f"></span></div>
                        <div class="g-menu" id="m-f"></div>
                    </div>
                    <div class="arrow-div">→</div>
                    <div class="g-sel" id="gs-t">
                        <div class="g-val"><span id="v-t"></span></div>
                        <div class="g-menu" id="m-t"></div>
                    </div>
                </div>
                <div class="c-screen" style="border: none; background: rgba(0,122,255,0.06); text-align: center; height: auto; padding: 25px 0;">
                    <div style="color:var(--text-active); font-weight: 600; font-size: 1.1rem; margin-bottom: 5px;">算 理 结 果</div><div id="u-res" style="font-size: 2.8rem; font-weight: bold; color: var(--text-active);">0</div>
                </div>
            </div>
        </div>
    </div>

<script>
    /* ================= 光照雷达 ================= */
    document.addEventListener('mousemove', e => {
        const hoverBtn = e.target.closest('button');
        if (hoverBtn) { 
            const rect = hoverBtn.getBoundingClientRect(); 
            hoverBtn.style.setProperty('--bx', `${e.clientX - rect.left}px`); 
            hoverBtn.style.setProperty('--by', `${e.clientY - rect.top}px`); 
        }
    });

    /* ================= 顶层水滴引擎 ================= */
    const trk = document.getElementById('track'), wrp = document.getElementById('lens-wrap'), cnt = document.getElementById('lens-cont'), cps = document.getElementById('capsule-box'), pnl = document.querySelectorAll('.panel');
    const baseItems = document.querySelectorAll('#layer-base .dock-item'), lensItems = document.querySelectorAll('#lens-cont .dock-item'); 
    const uw = 110, mb = 220;
    
    let dl = 0, px = 0, currentId = 0, isD = false, startX = 0, hasMoved = false;

    function apX(x, s) {
        let t = s ? 'transform 0.5s var(--ease-spring)' : 'none';
        wrp.style.transition = t; cnt.style.transition = t;
        wrp.style.setProperty('--x', `${x}px`); cnt.style.setProperty('--x', `${x}px`);
    }

    function applyOptics(pxPos) {
        let R = isD ? 85 : 55;
        lensItems.forEach((el, i) => {
            let dist = Math.abs(i * uw - pxPos);
            let norm = Math.min(dist / R, 1);
            let maxExtra = isD ? 0.1 : 0; 
            let scale = 1 + maxExtra * Math.pow(Math.cos(norm * Math.PI / 2), 2);
            el.style.transform = `scale(${scale})`; 
        });
    }

    trk.addEventListener('pointerdown', e => { 
        isD = true; hasMoved = false;  startX = e.clientX; 
        trk.setPointerCapture(e.pointerId); dl = trk.getBoundingClientRect().left; 
        cps.classList.add('is-active'); wrp.classList.add('is-dragging'); 
        applyOptics(px); 
    });

    trk.addEventListener('pointermove', e => { 
        if(!isD) return; 
        if(Math.abs(e.clientX - startX) > 8) { 
            if(!hasMoved) {
                hasMoved = true;
                baseItems.forEach(el => el.classList.add('no-anim'));
                lensItems.forEach(el => el.classList.add('no-anim'));
            }
            let v = e.clientX - dl - (uw / 2); px = Math.max(0, Math.min(v, mb)); 
            apX(px, false); 
            
            let R_wipe = 75; 
            baseItems.forEach((el, i) => {
                let dist = Math.abs(px - i * uw);
                el.style.opacity = Math.max(0, Math.min(1, (dist - R_wipe + 40) / 30));
            });
            applyOptics(px); 
        }
    });

    const rl = (e) => { 
        if(!isD) return; isD = false; 
        baseItems.forEach(el => el.classList.remove('no-anim')); lensItems.forEach(el => el.classList.remove('no-anim'));
        cps.classList.remove('is-active'); wrp.classList.remove('is-dragging'); 
        
        let id;
        if(hasMoved) {
            id = Math.max(0, Math.min(2, Math.round(px / uw))); 
            wrp.classList.add('is-popping'); setTimeout(() => { wrp.classList.remove('is-popping'); }, 250); 
        } else {
            id = Math.max(0, Math.min(2, Math.floor((e.clientX - dl) / uw)));
            if (id !== currentId) {
                wrp.classList.remove('is-popping', 'is-shooting'); void wrp.offsetWidth; 
                wrp.classList.add('is-shooting'); setTimeout(() => { wrp.classList.remove('is-shooting'); }, 600); 
            }
        }
        
        currentId = id; px = id * uw; apX(px, true); 
        baseItems.forEach((el, i) => { el.style.opacity = i === id ? '0' : '1'; });
        applyOptics(px); 
        pnl.forEach((p, i) => i === id ? p.classList.add('active') : p.classList.remove('active')); 
    };
    
    trk.addEventListener('pointerup', rl); trk.addEventListener('pointercancel', rl);

    /* ================= 计算器与亲戚转换 ================= */
    let cs='', rC='', cD=false; const cE = document.getElementById('c-exp'), cP = document.getElementById('c-preview'), cS = document.getElementById('c-screen');
    function sc() { cE.innerText = cs || '0'; if(cD) return; if(cs) { try{ let e=cs.replace(/÷/g,'/').replace(/×/g,'*').replace(/sin\(/g,'Math.sin(').replace(/cos\(/g,'Math.cos(').replace(/sqrt\(/g,'Math.sqrt('); let a=new Function('return '+e)(); if(!Number.isInteger(a)&&a!==undefined) a=parseFloat(a.toFixed(8)); rC=a; cP.innerText=isNaN(a)?'':a; }catch(e){ cP.innerText=''; } } else cP.innerText=''; }
    function bc(v) { if(cD){ cS.classList.remove('is-eval'); if('+-×÷'.includes(v)) cs=rC+v; else cs=v; cD=false; } else cs+=v; sc(); }
    function bd() { if(cD){ cS.classList.remove('is-eval'); cs=''; cD=false; } else cs=cs.slice(0,-1); sc(); }
    function bx() { cS.classList.remove('is-eval'); cs=''; rC=''; cD=false; sc(); }
    function be() { if(!cs||cD||cP.innerText==='') return; cD=true; cS.classList.add('is-eval'); } 

    let rq=[]; const rbD={"爸爸":"父亲","妈妈":"母亲","儿子":"儿子","女儿":"女儿","哥哥":"哥哥","弟弟":"弟弟","姐姐":"姐姐","妹妹":"妹妹","老公":"丈夫","老婆":"妻子","爸爸的爸爸":"爷爷","爸爸的妈妈":"奶奶","妈妈的爸爸":"外公","妈妈的妈妈":"外婆"};
    function rb(v) { rq.push(v); document.getElementById('r-ch').innerText = "我 → " + rq.join(' → '); document.getElementById('r-res').innerText = rbD[rq.join('的')] || "结构过深"; }
    function rc() { rq=[]; document.getElementById('r-ch').innerText="起始定点：我"; document.getElementById('r-res').innerText="自己"; }

    /* ================= 颠覆重构版：纯玻璃定制下拉选框驱动模型 ================= */
    const uSys = { 
        area: { n: "🏞 表面网络 (面积)", items: ["平方米 (m²)", "平方千米 (km²)", "公顷 (ha)", "市亩"] },
        vol:  { n: "🧊 空间维度 (体积)", items: ["立方米 (m³)", "升 (L)", "毫升 (mL)", "美制加仑 (gal)"] }
    };
    const ur = { "平方米 (m²)":1, "平方千米 (km²)":1000000, "公顷 (ha)":10000, "市亩":666.6667, "立方米 (m³)":1, "升 (L)":0.001, "毫升 (mL)":0.000001, "美制加仑 (gal)":0.0037854 };
    
    let uTy = 'area', uF = '平方米 (m²)', uT = '平方千米 (km²)';

    function bldOpts(c, arr, act, cbX) {
        document.getElementById(`m-${c}`).innerHTML = arr.map(op => {
            let pureVal = c==='ty' ? op : op; let txt = c==='ty' ? uSys[op].n : op;
            return `<div class="g-opt ${pureVal===act?'is-active':''}" onclick="setU('${c}','${pureVal}', event)">${txt}</div>`
        }).join('');
    }

    function syncU() {
        document.getElementById('v-ty').innerText = uSys[uTy].n;
        document.getElementById('v-f').innerText = uF;
        document.getElementById('v-t').innerText = uT;
        bldOpts('ty', ['area', 'vol'], uTy);
        bldOpts('f', uSys[uTy].items, uF);
        bldOpts('t', uSys[uTy].items, uT);
        doCal();
    }

    // 更新核心字典交互
    window.setU = function(cat, val, e) {
        e.stopPropagation(); document.querySelectorAll('.g-sel').forEach(x => x.classList.remove('is-open'));
        if(cat === 'ty') { uTy = val; uF = uSys[val].items[0]; uT = uSys[val].items[1]; }
        if(cat === 'f')  { uF = val; }
        if(cat === 't')  { uT = val; }
        syncU();
    }

    function doCal() {
        let v = parseFloat(document.getElementById('u-vl').value) || 0;
        let out = v * (ur[uF] / ur[uT]);
        document.getElementById('u-res').innerText = (out > 0 && out < 0.001 || out >= 1000000) ? out.toExponential(4) : out.toLocaleString('zh-CN', {maximumFractionDigits:5});
    }

    // 全局防点挂载，驱动完美弹窗生死动画
    document.querySelectorAll('.g-sel').forEach(el => {
        el.onclick = (e) => {
            let isOpen = el.classList.contains('is-open');
            document.querySelectorAll('.g-sel').forEach(x => x.classList.remove('is-open'));
            if(!isOpen) el.classList.add('is-open');
            e.stopPropagation();
        }
    });
    document.addEventListener('click', () => { document.querySelectorAll('.g-sel').forEach(x => x.classList.remove('is-open')); });

    /* ================= 引导装载================= */
    window.onload = () => { 
        sc(); syncU(); 
        baseItems[0].style.opacity = '0';
        px = 0; applyOptics(px); 
    }
</script>
</body>
</html>
